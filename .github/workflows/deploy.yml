# ABOUTME: GitHub Pages deploy for the static devotion planner (builds web/dist with bun).
# ABOUTME: Public site is SVG-only until an optimized art subset is committed (see plan Task 16 decision gate).
name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Build static site
        working-directory: web
        run: |
          bun install
          bun scripts/build-cover-table.ts
          # Reachability WASM core (the fast resolver); the page falls back to the TS resolver if absent.
          cargo build --release --target wasm32-unknown-unknown --manifest-path wasm/Cargo.toml
          BUILD_ID=$(bun -e 'import {computeBuildId} from "./src/adapters/coverTableBlob"; console.log(computeBuildId(await Bun.file("../data/devotions.json").text()))')
          bun build src/app/main.ts --outdir dist --target browser --define __BUILD_ID__="\"$BUILD_ID\""
          cp index.html dist/index.html
          cp src/styles.css dist/styles.css
          mkdir -p dist/data
          cp ../data/devotions.json dist/data/
          cp ../data/cover-table.bin dist/data/
          cp wasm/target/wasm32-unknown-unknown/release/reach.wasm dist/data/reach.wasm
          # Art only appears if a committed assets/ exists (see decision gate).
          if [ -d ../assets ]; then cp -r ../assets dist/assets; fi
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
