# ABOUTME: GitHub Pages deploy for the static devotion planner (builds web/dist with bun).
# ABOUTME: Public site is SVG-only until an optimized art subset is committed (see plan Task 16 decision gate).
name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      # Build via the same just recipes used locally so the Pages build cannot drift.
      # `just wasm` builds the fast resolver; `just build` runs cover-table, bundles, and
      # copies html/css/data/assets (it copies reach.wasm only if present, hence wasm first).
      - name: Build static site (just wasm + just build)
        run: |
          just web-install
          just wasm
          just build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
