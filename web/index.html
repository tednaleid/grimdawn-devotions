<!-- ABOUTME: HTML shell for the Grim Dawn Devotion Planner static page. -->
<!-- ABOUTME: Declares the layout skeleton (header, map container, sidebars, tooltip) and loads main.js. -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grim Dawn Devotion Planner</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <span class="plabel">Points</span>
    <div id="point-bar" tabindex="0" role="slider" aria-label="Point budget"></div>
    <span id="point-total"><button id="cap-toggle" type="button" title="Click to remove the point limit">55</button><span id="total-word"> total</span></span>
    <button id="reset-points">Reset points</button>
    <button id="reset-view">Reset view</button>
  </header>
  <main>
    <aside id="benefits" class="sidebar"></aside>
    <div id="map-container"></div>
    <aside id="affinity" class="sidebar"></aside>
  </main>
  <div id="tooltip"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
