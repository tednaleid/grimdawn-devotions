<!-- ABOUTME: HTML shell for the Grim Dawn Devotion Planner static page. -->
<!-- ABOUTME: Declares the layout skeleton (header, map container, sidebars, tooltip) and loads main.js. -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grim Dawn Devotion Planner</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <span class="plabel">Points</span>
    <div id="point-bar" tabindex="0" role="slider" aria-label="Point budget"></div>
    <span id="point-total"><button id="cap-toggle" type="button" title="Click to remove the point limit">55</button><span id="total-word"> total</span></span>
    <button id="reset-points">Reset</button>
  </header>
  <main>
    <aside id="benefits" class="sidebar"></aside>
    <div id="map-container">
      <div id="boot-loading"><div class="boot-spinner" aria-hidden="true"></div><p>Loading the devotion map…</p></div>
    </div>
    <aside id="affinity" class="sidebar"></aside>
  </main>
  <button id="drawer-left-btn" class="drawer-toggle drawer-left" type="button" aria-label="Show benefits" aria-controls="benefits" aria-expanded="false">Benefits</button>
  <button id="drawer-right-btn" class="drawer-toggle drawer-right" type="button" aria-label="Show affinity" aria-controls="affinity" aria-expanded="false">Affinity</button>
  <div id="drawer-scrim"></div>
  <div id="tooltip"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
